stages:
  - build
  - docker
  - deploy

.base-docker:
  image: registry.ulbricht.casa/docker-images/buildah:latest
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - echo "$CI_JOB_TOKEN" | buildah login -u gitlab-ci-token --password-stdin gitlab.imanuel.dev:443

test:
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/oven/bun:latest
  stage: build
  script:
    - bun install
    - bun run lint
    - bun run build
  artifacts:
    paths:
      - build

docker-build:
  stage: docker
  extends: .base-docker
  variables:
    IMG: $CI_REGISTRY_IMAGE/$ARCH:$CI_COMMIT_TAG
  script:
    - buildah build
      --platform=linux/$ARCH
      --build-arg CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX=$CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX
      -t $IMG
      $CI_PROJECT_DIR
    - buildah push $IMG
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - ARCH: amd64
      - ARCH: arm64
  tags:
    - runner-$ARCH

merge-manifests:
  stage: deploy
  extends: .base-docker
  variables:
    FQ_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  script:
    - buildah manifest create $FQ_IMAGE_NAME
    - buildah manifest add $FQ_IMAGE_NAME docker://$CI_REGISTRY_IMAGE/amd64:$CI_COMMIT_TAG
    - buildah manifest add $FQ_IMAGE_NAME docker://$CI_REGISTRY_IMAGE/arm64:$CI_COMMIT_TAG
    - buildah manifest push --all $FQ_IMAGE_NAME
  rules:
    - if: $CI_COMMIT_TAG

trigger-kube:
  variables:
    TAG: $CI_COMMIT_TAG
  needs:
    - job: merge-manifests
  stage: deploy
  trigger: server-management/main-server.ulbricht.casa/jinya.de
  rules:
    - if: $CI_COMMIT_TAG
